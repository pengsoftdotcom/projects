<app-list #listComponent [title]="(title ? title : '') + '配置列表'" [fields]="fields" [listData]="listData" [toolbarButtons]="listToolbarButtons"
    [actionButtons]="listActionButtons" (pageChange)="list()"></app-list>
<app-edit #editComponent [title]="(title ? title : '') + '配置编辑'" [fields]="fields" [form]="editForm" [toolbarButtons]="editToolbarButtons"
    [errors]="errors"></app-edit>
